<!DOCTYPE html>
<html>
<head>
<title>Paxos Editor</title>
<style>
body {
  font-family: monospace;
  margin: 20px;
}

textarea {
  width: 600px;
  height: 300px;
  font-family: monospace;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Paxos Text Editor</h2>

<textarea id="editor"></textarea>

<script>

const editor = document.getElementById("editor");
editor.focus();
const params = new URLSearchParams(window.location.search);
const port = params.get("port") || "8080";

const ws = new WebSocket(`ws://localhost:${port}`);

let logicalCursor = 0;
logicalCursor = editor.selectionStart;

ws.onopen = () => {
  console.log("connected");
};

ws.onmessage = (event) => {
  console.log("received msg:", event.data);
  applyOperation(event.data);
};

function encode(text) {
  return text.replace(/\n/g, "\\n");
}

editor.addEventListener("beforeinput", (e) => {

  const start = logicalCursor;
  const end = editor.selectionEnd;

  if (e.inputType === "insertLineBreak") {
    e.preventDefault();
    logicalCursor += 1;
    ws.send(`INSERT ${start} \\n`);
  }

  if (e.inputType === "insertText") {
    e.preventDefault();
    logicalCursor += e.data.length;
    ws.send(`INSERT ${start} ${encode(e.data)}`);
  }
  
  if (e.inputType === "insertFromPaste") {
    e.preventDefault();

    const text = encode((e.clipboardData || window.clipboardData).getData("text"));
    if (!text) return;
    if (start !== end) {
      logicalCursor -= (end - start);
      ws.send(`DELETE ${start} ${end-start}`);
    }
    logicalCursor += text.length;
    ws.send(`INSERT ${start} ${text}`);
  }

  if (e.inputType === "deleteContentBackward") {
    e.preventDefault();

    if (start !== end) {
      logicalCursor -= (end - start);
      ws.send(`DELETE ${start} ${end-start}`);
    } else if (start > 0) {
      logicalCursor -= 1;
      ws.send(`DELETE ${start-1} 1`);
    }
  }

  if (e.inputType === "deleteContentForward") {
    e.preventDefault();

    if (start !== end) {
      logicalCursor -= (end - start);
      ws.send(`DELETE ${start} ${end-start}`);
    } else {
      logicalCursor -= 1;
      ws.send(`DELETE ${start} 1`);
    }
  }
});

function applyOperation(msg) {
  msg = msg.replace(/\\n/g, "\n");
  let cursor = editor.selectionStart;

  const parts = msg.split(" ");
  const type = parts[0];
  const value = editor.value;

  if (type === "INSERT") {

    const pos = parseInt(parts[1]);
    const text = parts.slice(2).join(" ");

    editor.value =
      value.slice(0, pos) +
      text +
      value.slice(pos);

    if (pos <= cursor) {
      cursor += text.length;
    }

    if (pos <= logicalCursor) {
      logicalCursor += text.length;
    }
  }

  if (type === "DELETE") {

    const pos = parseInt(parts[1]);
    const len = parseInt(parts[2]);

    editor.value =
      value.slice(0, pos) +
      value.slice(pos + len);

    if (pos < cursor) {
      cursor -= Math.min(len, cursor - pos);
    }

    if (pos < logicalCursor) {
      logicalCursor -= Math.min(len, logicalCursor - pos);
    }
  }

  editor.selectionStart = cursor;
  editor.selectionEnd = cursor;
  console.log("updated logical cursor:", logicalCursor);
  console.log("updated cursor:", cursor);
}


</script>

</body>
</html>
