<!DOCTYPE html>
<html>
<head>
<title>Paxos Editor</title>
<style>
body {
  font-family: monospace;
  margin: 20px;
}

textarea {
  width: 600px;
  height: 300px;
  font-family: monospace;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Paxos Text Editor</h2>

<textarea id="editor"></textarea>

<script>

const editor = document.getElementById("editor");
editor.focus();
const params = new URLSearchParams(window.location.search);
const port = params.get("port") || "8080";
const clientId =
  params.get("clientId") || Math.random().toString(36).slice(2);
console.log("clientId:", clientId);
let requestId = 0;
const seen = new Set();

const pending = new Map(); // key -> { msg, timestamp }
function sendOp(msg, sender, reqId) {
  const key = `${sender}-${reqId}`;

  pending.set(key, {
    msg,
    timestamp: Date.now()
  });

  ws.send(msg);
}

const ws = new WebSocket(`ws://localhost:${port}`);

let logicalCursor = 0;
logicalCursor = editor.selectionStart;

ws.onopen = () => {
  console.log("connected");
};

ws.onmessage = (event) => {
  console.log("received msg:", event.data);
  applyOperation(event.data);
};

function encode(text) {
  return text.replace(/\n/g, "\\n");
}

let suppressSelectionUpdate = false;

document.addEventListener("selectionchange", () => {
  if (suppressSelectionUpdate) return;

  if (document.activeElement === editor) {
    logicalCursor = editor.selectionStart;
  }
});

editor.addEventListener("beforeinput", (e) => {

  const start = logicalCursor;
  const end = logicalCursor + (editor.selectionEnd - editor.selectionStart);

  if (e.inputType === "insertLineBreak") {
    e.preventDefault();
    logicalCursor += 1;
    const id = requestId++;
    const msg = `${clientId} ${id} INSERT ${start} \\n`;
    sendOp(msg, clientId, id);
  }

  if (e.inputType === "insertText") {
    e.preventDefault();
    logicalCursor += e.data.length;
    const id = requestId++;
    const msg = `${clientId} ${id} INSERT ${start} ${encode(e.data)}`;
    sendOp(msg, clientId, id);
  }
  
  if (e.inputType === "insertFromPaste") {
    e.preventDefault();

    const text = encode((e.clipboardData || window.clipboardData).getData("text"));
    if (!text) return;
    if (start !== end) {
      logicalCursor -= (end - start);
      const id = requestId++;
      const msg = `${clientId} ${id} DELETE ${start} ${end-start}`;
      sendOp(msg, clientId, id);
    }
    logicalCursor += text.length;
    const id = requestId++;
    const msg = `${clientId} ${id} INSERT ${start} ${text}`;
    sendOp(msg, clientId, id);
  }

  if (e.inputType === "deleteContentBackward") {
    e.preventDefault();

    if (start !== end) {
      logicalCursor -= (end - start);
      const id = requestId++;
      const msg = `${clientId} ${id} DELETE ${start} ${end-start}`;
      sendOp(msg, clientId, id);
    } else if (start > 0) {
      logicalCursor -= 1;
      const id = requestId++;
      const msg = `${clientId} ${id} DELETE ${start-1} 1`;
      sendOp(msg, clientId, id);
    }
  }

  if (e.inputType === "deleteContentForward") {
    e.preventDefault();

    if (start !== end) {
      logicalCursor -= (end - start);
      const id = requestId++;
      const msg = `${clientId} ${id} DELETE ${start} ${end-start}`;
      sendOp(msg, clientId, id);
    } else {
      logicalCursor -= 1;
      const id = requestId++;
      const msg = `${clientId} ${id} DELETE ${start} 1`;
      sendOp(msg, clientId, id);
    }
  }
});

function applyOperation(msg) {
  msg = msg.replace(/\\n/g, "\n");
  let cursor = editor.selectionStart;

  const parts = msg.split(" ");

  const sender = parts[0];
  const reqId = parts[1]; // (you may use this later)
  const type = parts[2];
  const value = editor.value;
  const key = `${sender}-${reqId}`;
  if (seen.has(key)) return;
  seen.add(key);
  pending.delete(key);

  if (type === "INSERT") {

    const pos = parseInt(parts[3]);
    const text = parts.slice(4).join(" ");

    editor.value =
      value.slice(0, pos) +
      text +
      value.slice(pos);

    if (pos <= cursor) {
      cursor += text.length;
    }

    if (sender !== clientId && pos <= logicalCursor) {
      logicalCursor += text.length;
    }
  }

  if (type === "DELETE") {

    const pos = parseInt(parts[3]);
    const len = parseInt(parts[4]);

    editor.value =
      value.slice(0, pos) +
      value.slice(pos + len);

    if (pos < cursor) {
      cursor -= Math.min(len, cursor - pos);
    }

    if (sender !== clientId && pos < logicalCursor) {
      logicalCursor -= Math.min(len, logicalCursor - pos);
    }
  }

  suppressSelectionUpdate = true;
  editor.selectionStart = cursor;
  editor.selectionEnd = cursor;
  suppressSelectionUpdate = false;
  console.log("updated logical cursor:", logicalCursor);
  console.log("updated cursor:", cursor);
}

setInterval(() => {
  const now = Date.now();

  for (const [key, op] of pending.entries()) {
    if (now - op.timestamp > 1000) { // 1 second timeout
      console.log("retrying:", key);
      ws.send(op.msg);
      op.timestamp = now;
    }
  }
}, 500);


</script>

</body>
</html>
